<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fuel Free Train Plane Prototype</title>
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/",
                "nipplejs": "https://esm.sh/nipplejs@0.10.1"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="ui-layer">
        <div id="status-panel">
            <div class="stat">SPEED: <span id="speed-val">0</span> km/h</div>
            <div class="stat">ALTITUDE: <span id="alt-val">0</span> m</div>
            <div class="stat">WIRE: <span id="wire-val">0</span> m</div>
            <div class="energy-flow">ENERGY TRANSFER: <span style="color:#00ffff">ACTIVE</span></div>
        </div>

        <div id="controls-right">
            <button id="btn-extend" class="control-btn">▲ WIRE</button>
            <button id="btn-retract" class="control-btn">▼ WIRE</button>
        </div>
        
        <div id="joystick-zone"></div>
        <div id="instruction-overlay">Drag Joystick to Move • Adjust Wire Length to Fly</div>
    </div>

    <script type="module" src="./js/main.js"></script>

</body>
</html>
